<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovAI Announcer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="novai-card" id="novaiCard">

    <div class="avatar-wrap">
      <div class="radar-ring"></div>
      <div class="radar-ring delay"></div>
      <svg class="avatar" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="32" r="30" fill="url(#botGradient)"/>
        <defs>
          <linearGradient id="botGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#4CE0D2"/>
            <stop offset="1" stop-color="#8B7FFF"/>
          </linearGradient>
        </defs>
        <rect x="16" y="22" width="32" height="22" rx="7" fill="#0B0F19"/>
        <circle class="eye" cx="25" cy="33" r="3.4" fill="#4CE0D2"/>
        <circle class="eye" cx="39" cy="33" r="3.4" fill="#4CE0D2"/>
        <rect x="29" y="12" width="6" height="10" rx="3" fill="#0B0F19"/>
        <circle cx="32" cy="10" r="3" fill="#FFB84C"/>
      </svg>
    </div>

    <div class="content">
      <div class="header-row">
        <span class="bot-name">NovAI</span>
        <span class="status-dot" id="statusDot" title="online"></span>
        <span class="new-flag" id="newFlag">NEW</span>
      </div>

      <div class="message-box">
        <div class="title-line" id="titleLine"></div>
        <div class="message-line" id="messageLine">
          <span class="quote-mark">&ldquo;</span><span id="messageText"></span><span class="quote-mark">&rdquo;</span><span class="cursor" id="cursor">|</span>
        </div>
      </div>

      <div class="timestamp" id="timestamp">connecting&hellip;</div>
    </div>

  </div>

<script src="app.js"></script>
</body>
</html>
